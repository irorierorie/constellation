<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" fill="#020408"/>
  <!-- Construction triangle (tilted right triangle) -->
  <polygon points="9,21 9,8 25,21" fill="#080a10" stroke="#d2b464" stroke-width="0.8" stroke-opacity="0.5" transform="rotate(-12, 16, 16)"/>
  <!-- Right angle mark -->
  <polyline points="9,18 12,18 12,21" fill="none" stroke="#d2b464" stroke-width="0.5" stroke-opacity="0.2" transform="rotate(-12, 16, 16)"/>
  <!-- Heart spark -->
  <circle cx="14.5" cy="16.5" r="1.5" fill="#fff0c8" opacity="0.6"/>
  <!-- Incoming light (from left) -->
  <line x1="2" y1="12" x2="11" y2="15" stroke="#fff5dc" stroke-width="1" stroke-opacity="0.2"/>
  <!-- Scattered rays (upward-right) -->
  <line x1="18" y1="13" x2="28" y2="4" stroke="#99d9f2" stroke-width="0.7" stroke-opacity="0.35"/>
  <line x1="19" y1="14" x2="29" y2="6" stroke="#f2d98c" stroke-width="0.7" stroke-opacity="0.35"/>
  <line x1="20" y1="14" x2="30" y2="9" stroke="#d9bfe6" stroke-width="0.7" stroke-opacity="0.35"/>
  <line x1="20" y1="15" x2="30" y2="12" stroke="#e6cc99" stroke-width="0.7" stroke-opacity="0.35"/>
  <line x1="20" y1="16" x2="29" y2="15" stroke="#d9bf73" stroke-width="0.7" stroke-opacity="0.35"/>
  <line x1="20" y1="17" x2="29" y2="18" stroke="#bfcce6" stroke-width="0.7" stroke-opacity="0.3"/>
  <line x1="19" y1="18" x2="28" y2="20" stroke="#8ca6bf" stroke-width="0.7" stroke-opacity="0.3"/>
  <line x1="18" y1="19" x2="27" y2="23" stroke="#8099b3" stroke-width="0.7" stroke-opacity="0.3"/>
  <line x1="17" y1="20" x2="25" y2="25" stroke="#998cbf" stroke-width="0.7" stroke-opacity="0.3"/>
</svg>
