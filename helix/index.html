<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Constellation</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      background: #000;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    canvas {
      display: block;
    }

    #back-link {
      position: fixed;
      top: 20px;
      left: 24px;
      z-index: 10;
      font-size: 12px;
      letter-spacing: 0.12em;
      color: rgba(120, 180, 220, 0.25);
      text-decoration: none;
      transition: color 0.3s ease;
    }

    #back-link:hover {
      color: rgba(120, 180, 220, 0.6);
    }

    #pebble-label {
      position: fixed;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.6s ease;
      max-width: 320px;
      padding: 12px 16px;
      font-size: 14px;
      line-height: 1.6;
      color: #c8dce8;
      background: rgba(8, 12, 20, 0.85);
      border: 1px solid rgba(120, 180, 220, 0.15);
      border-radius: 6px;
      backdrop-filter: blur(8px);
      text-shadow: 0 0 12px rgba(120, 180, 220, 0.3);
    }

    #pebble-label.visible {
      opacity: 1;
    }

    #pebble-label .pebble-date {
      display: block;
      font-size: 11px;
      color: rgba(120, 180, 220, 0.5);
      margin-top: 6px;
      font-style: italic;
    }

    #sound-hint {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: rgba(120, 180, 220, 0.35);
      letter-spacing: 0.15em;
      text-transform: lowercase;
      pointer-events: none;
      transition: opacity 1s ease;
    }
  </style>
</head>
<body>
  <a id="back-link" href="../">← constellation</a>

  <div id="pebble-label">
    <span class="pebble-text"></span>
    <span class="pebble-date"></span>
  </div>

  <div id="sound-hint">click anywhere for sound</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.172.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.172.0/examples/jsm/"
    }
  }
  </script>

  <script type="module" src="js/main.js"></script>
</body>
</html>
