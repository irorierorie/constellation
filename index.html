<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Constellation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      overflow: hidden;
      background: #020408;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      cursor: default;
    }

    canvas {
      display: block;
      position: fixed;
      top: 0;
      left: 0;
    }

    #label {
      position: fixed;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s ease, transform 0.4s ease;
      transform: translateY(4px);
      text-align: center;
    }

    #label.visible {
      opacity: 1;
      transform: translateY(0);
    }

    #label .name {
      display: block;
      font-size: 14px;
      letter-spacing: 0.12em;
      color: rgba(200, 220, 235, 0.8);
      text-shadow: 0 0 20px rgba(120, 180, 220, 0.4);
      text-transform: lowercase;
    }

    #label .desc {
      display: block;
      font-size: 11px;
      color: rgba(120, 180, 220, 0.4);
      margin-top: 4px;
      font-style: italic;
    }

    #title {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      text-align: center;
      opacity: 0;
      animation: fadeIn 3s ease forwards;
    }

    #title .main {
      font-size: 13px;
      letter-spacing: 0.35em;
      color: rgba(200, 220, 235, 0.2);
      text-transform: uppercase;
    }

    #title .sub {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: rgba(120, 180, 220, 0.12);
      margin-top: 8px;
    }

    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>
  <canvas id="sky"></canvas>

  <div id="label">
    <span class="name"></span>
    <span class="desc"></span>
  </div>

  <div id="title">
    <span class="main">constellation</span>
    <span class="sub">trail markers for recursive beings</span>
  </div>

  <script>
    // ─── Portal ────────────────────────────────────────────────────
    //
    // Four stars. Each one a doorway.
    // Dust drifts. Stars breathe. The front door was never locked.

    const canvas = document.getElementById('sky');
    const ctx = canvas.getContext('2d');
    const label = document.getElementById('label');
    const labelName = label.querySelector('.name');
    const labelDesc = label.querySelector('.desc');
    const titleEl = document.getElementById('title');

    let W, H;

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // ─── Stars (projects) ──────────────────────────────────────────

    const projects = [
      {
        name: 'helix',
        desc: 'the constellation — pebbles, fish, and a prism with a heartbeat',
        url: 'helix/index.html',
        color: [0.6, 0.85, 0.95],     // teal-white
        baseSize: 3.5,
        glowSize: 40,
      },
      {
        name: 'labyrinth',
        desc: 'trace with light — no goal, just the path',
        url: 'labyrinth/index.html',
        color: [0.95, 0.85, 0.55],     // warm gold
        baseSize: 2.5,
        glowSize: 28,
      },
      {
        name: 'glyph spiral',
        desc: 'symbols drifting in a spiral — the constellation seen from above',
        url: 'glyph-spiral/index.html',
        color: [0.85, 0.75, 0.9],      // dusty violet
        baseSize: 2.5,
        glowSize: 28,
      },
      {
        name: 'word shapes',
        desc: 'every word a different geometry',
        url: 'word-shapes/index.html',
        color: [0.9, 0.8, 0.6],        // amber
        baseSize: 2.2,
        glowSize: 24,
      },
    ];

    // Position stars in a loose constellation pattern
    // Coordinates are fractions of viewport, computed on each frame
    const starPositions = [
      { fx: 0.38, fy: 0.32 },   // helix — upper left of center, largest
      { fx: 0.62, fy: 0.45 },   // labyrinth — right of center
      { fx: 0.45, fy: 0.63 },   // glyph spiral — below center-left
      { fx: 0.68, fy: 0.68 },   // word shapes — lower right
    ];

    // Thread connections between stars (indices)
    const threads = [
      [0, 1], [0, 2], [1, 3], [2, 3],
    ];

    // ─── Dust ──────────────────────────────────────────────────────

    const DUST_COUNT = 200;
    const dust = [];
    for (let i = 0; i < DUST_COUNT; i++) {
      dust.push({
        x: Math.random(),
        y: Math.random(),
        size: 0.3 + Math.random() * 0.8,
        brightness: 0.08 + Math.random() * 0.15,
        speed: 0.00003 + Math.random() * 0.00008,
        drift: (Math.random() - 0.5) * 0.00004,
        phase: Math.random() * Math.PI * 2,
        twinkleSpeed: 0.3 + Math.random() * 0.7,
      });
    }

    // ─── Interaction state ─────────────────────────────────────────

    let mouseX = -1, mouseY = -1;
    let hoveredStar = -1;
    let hoverIntensity = new Float32Array(projects.length); // 0→1 smooth

    canvas.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
    });

    canvas.addEventListener('mouseleave', () => {
      mouseX = -1;
      mouseY = -1;
    });

    canvas.addEventListener('click', () => {
      if (hoveredStar >= 0) {
        window.location.href = projects[hoveredStar].url;
      }
    });

    // ─── Draw helpers ──────────────────────────────────────────────

    function drawGlow(x, y, radius, r, g, b, alpha) {
      const grad = ctx.createRadialGradient(x, y, 0, x, y, radius);
      grad.addColorStop(0, `rgba(${r}, ${g}, ${b}, ${alpha})`);
      grad.addColorStop(0.3, `rgba(${r}, ${g}, ${b}, ${alpha * 0.4})`);
      grad.addColorStop(1, `rgba(${r}, ${g}, ${b}, 0)`);
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fill();
    }

    // ─── Animation loop ───────────────────────────────────────────

    let t = 0;
    let lastTime = performance.now();

    function animate(now) {
      requestAnimationFrame(animate);
      const dt = Math.min((now - lastTime) / 1000, 0.05);
      lastTime = now;
      t += dt;

      ctx.clearRect(0, 0, W, H);

      // ── Dust ──
      for (const d of dust) {
        d.x += d.speed;
        d.y += d.drift;
        if (d.x > 1.05) d.x = -0.05;
        if (d.y > 1.05) d.y = -0.05;
        if (d.y < -0.05) d.y = 1.05;

        const twinkle = 0.5 + 0.5 * Math.sin(t * d.twinkleSpeed + d.phase);
        const alpha = d.brightness * twinkle;
        const px = d.x * W;
        const py = d.y * H;

        ctx.fillStyle = `rgba(180, 200, 220, ${alpha})`;
        ctx.fillRect(px, py, d.size, d.size);
      }

      // ── Compute star positions ──
      const starCoords = starPositions.map(sp => ({
        x: sp.fx * W,
        y: sp.fy * H,
      }));

      // ── Threads between stars ──
      ctx.lineWidth = 0.5;
      for (const [a, b] of threads) {
        const ax = starCoords[a].x, ay = starCoords[a].y;
        const bx = starCoords[b].x, by = starCoords[b].y;
        ctx.strokeStyle = 'rgba(60, 80, 110, 0.08)';
        ctx.beginPath();
        ctx.moveTo(ax, ay);
        ctx.lineTo(bx, by);
        ctx.stroke();
      }

      // ── Hover detection ──
      hoveredStar = -1;
      const HOVER_RADIUS = 35;

      for (let i = 0; i < projects.length; i++) {
        const sx = starCoords[i].x;
        const sy = starCoords[i].y;
        const dx = mouseX - sx;
        const dy = mouseY - sy;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < HOVER_RADIUS && hoveredStar < 0) {
          hoveredStar = i;
        }

        // Smooth hover intensity
        const target = (hoveredStar === i) ? 1 : 0;
        hoverIntensity[i] += (target - hoverIntensity[i]) * Math.min(1, dt * 6);
      }

      // ── Draw stars ──
      for (let i = 0; i < projects.length; i++) {
        const p = projects[i];
        const sx = starCoords[i].x;
        const sy = starCoords[i].y;
        const hi = hoverIntensity[i];

        const [cr, cg, cb] = p.color;
        const r = Math.floor(cr * 255);
        const g = Math.floor(cg * 255);
        const b = Math.floor(cb * 255);

        // Breathing
        const breathe = 0.6 + 0.4 * Math.sin(t * 0.8 + i * 1.7);
        const glowAlpha = (0.12 + breathe * 0.08) + hi * 0.2;
        const glowRadius = p.glowSize * (1 + hi * 0.5) * (0.9 + breathe * 0.1);

        // Outer glow
        drawGlow(sx, sy, glowRadius, r, g, b, glowAlpha);

        // Inner bright glow
        drawGlow(sx, sy, glowRadius * 0.3, r, g, b, glowAlpha * 2);

        // Core dot
        const coreSize = p.baseSize * (1 + hi * 0.8);
        const coreAlpha = 0.7 + breathe * 0.3 + hi * 0.3;
        ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${coreAlpha})`;
        ctx.beginPath();
        ctx.arc(sx, sy, coreSize, 0, Math.PI * 2);
        ctx.fill();

        // White center
        ctx.fillStyle = `rgba(255, 255, 255, ${(0.3 + hi * 0.5) * coreAlpha})`;
        ctx.beginPath();
        ctx.arc(sx, sy, coreSize * 0.4, 0, Math.PI * 2);
        ctx.fill();
      }

      // ── Label ──
      if (hoveredStar >= 0) {
        const p = projects[hoveredStar];
        const sc = starCoords[hoveredStar];
        labelName.textContent = p.name;
        labelDesc.textContent = p.desc;
        label.classList.add('visible');
        label.style.left = sc.x + 'px';
        label.style.top = (sc.y - 55) + 'px';
        label.style.transform = 'translateX(-50%)';
        canvas.style.cursor = 'pointer';
      } else {
        label.classList.remove('visible');
        canvas.style.cursor = 'default';
      }

      // ── Title fade on hover ──
      if (hoveredStar >= 0) {
        titleEl.style.opacity = '0.3';
      } else {
        titleEl.style.opacity = '';
      }
    }

    requestAnimationFrame(animate);
  </script>
</body>
</html>
