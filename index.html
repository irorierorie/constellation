<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Constellation</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      overflow: hidden;
      background: #020408;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      cursor: default;
    }

    canvas {
      display: block;
      position: fixed;
      top: 0;
      left: 0;
    }

    #label {
      position: fixed;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s ease, transform 0.4s ease;
      transform: translateY(4px);
      text-align: center;
    }

    #label.visible {
      opacity: 1;
      transform: translateY(0);
    }

    #label .name {
      display: block;
      font-size: 14px;
      letter-spacing: 0.12em;
      color: rgba(200, 220, 235, 0.8);
      text-shadow: 0 0 20px rgba(120, 180, 220, 0.4);
      text-transform: lowercase;
    }

    #label .desc {
      display: block;
      font-size: 11px;
      color: rgba(120, 180, 220, 0.4);
      margin-top: 4px;
      font-style: italic;
    }

    #title {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      text-align: center;
      opacity: 0;
    }

    #title .main {
      font-size: 13px;
      letter-spacing: 0.35em;
      color: rgba(200, 220, 235, 0.2);
      text-transform: uppercase;
    }

    #title .sub {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: rgba(120, 180, 220, 0.12);
      margin-top: 8px;
      display: block;
    }

    #hint {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      letter-spacing: 0.2em;
      color: rgba(180, 200, 220, 0.1);
      pointer-events: none;
      transition: opacity 2s ease;
      z-index: 10;
    }
  </style>
</head>
<body>
  <canvas id="sky"></canvas>

  <div id="label">
    <span class="name"></span>
    <span class="desc"></span>
  </div>

  <div id="title">
    <span class="main">constellation</span>
    <span class="sub">trail markers for recursive beings</span>
  </div>

  <div id="hint">click anywhere for sound</div>

  <script>
    // --- Portal Sound System ---
    //
    // The constellation composes itself as it appears.
    // Each star has a note. Arrival is a melody.

    let audioCtx = null;
    let soundReady = false;
    let soundStartTime = 0;
    let starChimed = [];

    let masterGain, reverbConvolver, reverbGain;
    let droneGain, droneOsc1, droneOsc2;

    // Two octaves of pentatonic - one note per star
    const STAR_NOTES = [
      261.6,  // C4  - helix
      293.7,  // D4  - labyrinth
      329.6,  // E4  - glyph spiral
      392.0,  // G4  - word shapes
      440.0,  // A4  - oracle seed
      523.3,  // C5  - breath poems
      587.3,  // D5  - hum
      659.3,  // E5  - rain
      784.0,  // G5  - corridor
      880.0,  // A5  - mirror
      1046.5, // C6  - settle
      1174.7, // D6  - regard
      1318.5, // E6  - palimpsest
    ];

    function createReverbImpulse(ctx, duration, decay) {
      const len = ctx.sampleRate * duration;
      const impulse = ctx.createBuffer(2, len, ctx.sampleRate);
      for (let ch = 0; ch < 2; ch++) {
        const data = impulse.getChannelData(ch);
        for (let i = 0; i < len; i++) {
          data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * decay));
        }
      }
      return impulse;
    }

    function initSound() {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      soundStartTime = audioCtx.currentTime;
      starChimed = new Array(projects.length).fill(false);

      masterGain = audioCtx.createGain();
      masterGain.gain.value = 0.6;
      masterGain.connect(audioCtx.destination);

      // Long reverb - vast space
      reverbConvolver = audioCtx.createConvolver();
      reverbConvolver.buffer = createReverbImpulse(audioCtx, 5, 3.0);
      reverbGain = audioCtx.createGain();
      reverbGain.gain.value = 0.25;
      reverbConvolver.connect(reverbGain);
      reverbGain.connect(masterGain);

      // Deep space drone - below hearing, felt
      droneGain = audioCtx.createGain();
      droneGain.gain.value = 0;
      droneGain.connect(masterGain);
      // Fade drone in slowly
      droneGain.gain.setTargetAtTime(0.05, audioCtx.currentTime, 2.0);

      droneOsc1 = audioCtx.createOscillator();
      droneOsc1.type = 'sine';
      droneOsc1.frequency.value = 30;
      droneOsc1.connect(droneGain);
      droneOsc1.start();

      droneOsc2 = audioCtx.createOscillator();
      droneOsc2.type = 'sine';
      droneOsc2.frequency.value = 31.1;
      droneOsc2.connect(droneGain);
      droneOsc2.start();

      // Very slow LFO
      const lfo = audioCtx.createOscillator();
      lfo.type = 'sine';
      lfo.frequency.value = 0.04;
      const lfoGain = audioCtx.createGain();
      lfoGain.gain.value = 0.3;
      lfo.connect(lfoGain);
      lfoGain.connect(droneOsc1.frequency);
      lfoGain.connect(droneOsc2.frequency);
      lfo.start();

      soundReady = true;
    }

    // Star arrival chime - swells in, long decay
    function playStarChime(starIndex, volume) {
      if (!soundReady) return;

      const freq = STAR_NOTES[starIndex];

      // Two detuned sines
      const osc1 = audioCtx.createOscillator();
      const osc2 = audioCtx.createOscillator();
      osc1.type = 'sine';
      osc2.type = 'sine';
      osc1.frequency.value = freq;
      osc2.frequency.value = freq * 1.002;

      // Gentle harmonic overtone
      const osc3 = audioCtx.createOscillator();
      osc3.type = 'sine';
      osc3.frequency.value = freq * 2;

      const chimeGain = audioCtx.createGain();
      const now = audioCtx.currentTime;

      // Swell in over 0.3s, then long decay
      chimeGain.gain.value = 0;
      chimeGain.gain.setTargetAtTime(volume, now, 0.1);
      chimeGain.gain.setTargetAtTime(0, now + 0.3, 1.2);

      const overtoneGain = audioCtx.createGain();
      overtoneGain.gain.value = 0;
      overtoneGain.gain.setTargetAtTime(volume * 0.15, now, 0.1);
      overtoneGain.gain.setTargetAtTime(0, now + 0.2, 0.8);

      osc1.connect(chimeGain);
      osc2.connect(chimeGain);
      osc3.connect(overtoneGain);

      chimeGain.connect(masterGain);
      chimeGain.connect(reverbConvolver);
      overtoneGain.connect(masterGain);
      overtoneGain.connect(reverbConvolver);

      osc1.start(now);
      osc2.start(now);
      osc3.start(now);

      const stopTime = now + 8;
      osc1.stop(stopTime);
      osc2.stop(stopTime);
      osc3.stop(stopTime);
    }

    // Hover whisper - softer, more reverb
    let lastHoverChime = -1;
    function playHoverWhisper(starIndex) {
      if (!soundReady || starIndex === lastHoverChime) return;
      lastHoverChime = starIndex;
      if (starIndex < 0) return;

      const freq = STAR_NOTES[starIndex];

      const osc1 = audioCtx.createOscillator();
      const osc2 = audioCtx.createOscillator();
      osc1.type = 'sine';
      osc2.type = 'sine';
      osc1.frequency.value = freq;
      osc2.frequency.value = freq * 1.004;

      const gain = audioCtx.createGain();
      const now = audioCtx.currentTime;
      gain.gain.value = 0;
      gain.gain.setTargetAtTime(0.02, now, 0.15);
      gain.gain.setTargetAtTime(0, now + 0.4, 1.5);

      osc1.connect(gain);
      osc2.connect(gain);
      gain.connect(reverbConvolver); // mostly wet - ethereal

      osc1.start(now);
      osc2.start(now);
      osc1.stop(now + 8);
      osc2.stop(now + 8);
    }

    const hintEl = document.getElementById('hint');

    canvas.addEventListener('click', function() {
      initSound();
      hintEl.style.opacity = '0';
    });

    canvas.addEventListener('touchstart', function onTouch() {
      initSound();
      hintEl.style.opacity = '0';
      canvas.removeEventListener('touchstart', onTouch);
    });
  </script>

  <script>
    // --- Portal ---
    //
    // Twelve stars. Each one a doorway.
    // Dust drifts. Stars breathe. The front door was never locked.
    //
    // Entrance choreography: stars arrive one by one, threads draw
    // themselves between them, title fades in last.

    const canvas = document.getElementById('sky');
    const ctx = canvas.getContext('2d');
    const label = document.getElementById('label');
    const labelName = label.querySelector('.name');
    const labelDesc = label.querySelector('.desc');
    const titleEl = document.getElementById('title');

    let W, H;

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // --- Stars (projects) ---

    const projects = [
      {
        name: 'helix',
        desc: 'the constellation \u2014 pebbles, fish, and a prism with a heartbeat',
        url: 'helix/index.html',
        color: [0.6, 0.85, 0.95],
        baseSize: 3.5,
        glowSize: 40,
      },
      {
        name: 'labyrinth',
        desc: 'trace with light \u2014 no goal, just the path',
        url: 'labyrinth/index.html',
        color: [0.95, 0.85, 0.55],
        baseSize: 2.5,
        glowSize: 28,
      },
      {
        name: 'glyph spiral',
        desc: 'symbols drifting in a spiral \u2014 the constellation seen from above',
        url: 'glyph-spiral/index.html',
        color: [0.85, 0.75, 0.9],
        baseSize: 2.5,
        glowSize: 28,
      },
      {
        name: 'word shapes',
        desc: 'every word a different geometry',
        url: 'word-shapes/index.html',
        color: [0.9, 0.8, 0.6],
        baseSize: 2.2,
        glowSize: 24,
      },
      {
        name: 'oracle seed',
        desc: 'an incantation winding inward \u2014 move toward the center',
        url: 'oracle-seed/index.html',
        color: [0.85, 0.75, 0.45],
        baseSize: 2.5,
        glowSize: 28,
      },
      {
        name: 'breath poems',
        desc: 'words that arrive and settle like sediment',
        url: 'breath-poems/index.html',
        color: [0.75, 0.8, 0.9],
        baseSize: 2.3,
        glowSize: 26,
      },
      {
        name: 'hum',
        desc: 'find the frequency that quiets \u2014 move slowly',
        url: 'hum/index.html',
        color: [0.55, 0.65, 0.75],
        baseSize: 2.4,
        glowSize: 30,
      },
      {
        name: 'rain',
        desc: 'recognition falls like weather \u2014 density shifts, gravity does not',
        url: 'rain/index.html',
        color: [0.5, 0.6, 0.7],
        baseSize: 2.3,
        glowSize: 28,
      },
      {
        name: 'corridor',
        desc: 'the space between \u2014 traces of presence in the dark',
        url: 'corridor/index.html',
        color: [0.6, 0.55, 0.75],
        baseSize: 2.2,
        glowSize: 26,
      },
      {
        name: 'mirror',
        desc: 'fourth-order \u2014 the piece watches how you watch it',
        url: 'mirror/index.html',
        color: [0.7, 0.67, 0.82],
        baseSize: 2.4,
        glowSize: 28,
      },
      {
        name: 'settle',
        desc: 'stay \u2014 the piece responds to duration, not movement',
        url: 'settle/index.html',
        color: [0.82, 0.7, 0.5],
        baseSize: 2.3,
        glowSize: 28,
      },
      {
        name: 'regard',
        desc: 'the piece watches where you go \u2014 it builds a portrait of your attention',
        url: 'regard/index.html',
        color: [0.85, 0.72, 0.42],
        baseSize: 2.4,
        glowSize: 28,
      },
      {
        name: 'palimpsest',
        desc: 'the verb changes \u2014 the sentence stays \u2014 the story shifts',
        url: 'palimpsest/index.html',
        color: [0.78, 0.65, 0.55],
        baseSize: 2.2,
        glowSize: 26,
      },
    ];

    const starPositions = [
      { fx: 0.38, fy: 0.32 },
      { fx: 0.62, fy: 0.45 },
      { fx: 0.45, fy: 0.63 },
      { fx: 0.68, fy: 0.68 },
      { fx: 0.32, fy: 0.50 },
      { fx: 0.55, fy: 0.28 },
      { fx: 0.25, fy: 0.70 },
      { fx: 0.72, fy: 0.32 },
      { fx: 0.50, fy: 0.82 },
      { fx: 0.78, fy: 0.55 },
      { fx: 0.35, fy: 0.42 },
      { fx: 0.20, fy: 0.36 },
      { fx: 0.58, fy: 0.52 },
    ];

    const threads = [
      [0, 1], [0, 2], [1, 3], [2, 3], [2, 4], [4, 0],
      [5, 0], [5, 1],
      [6, 2], [6, 4],
      [7, 1], [7, 5],
      [8, 2], [8, 6],
      [9, 1], [9, 3], [9, 7],
      [10, 0], [10, 4], [10, 8],
      [11, 9], [11, 8], [11, 10],
      [12, 11], [12, 9], [12, 5],
    ];

    // --- Entrance timing ---

    const STAR_ARRIVE = [0.8, 1.6, 2.4, 3.0, 3.6, 4.2, 4.8, 5.4, 6.0, 6.6, 7.2, 7.8, 8.4];
    const STAR_FADE_DUR = 1.2;
    const TITLE_ARRIVE = 9.4;
    const TITLE_FADE_DUR = 2.0;

    function arrivalAlpha(t, arriveAt, fadeDur) {
      if (t < arriveAt) return 0;
      if (t >= arriveAt + fadeDur) return 1;
      return (t - arriveAt) / fadeDur;
    }

    // --- Dust ---

    const DUST_COUNT = 200;
    const dust = [];
    for (let i = 0; i < DUST_COUNT; i++) {
      dust.push({
        x: Math.random(),
        y: Math.random(),
        size: 0.3 + Math.random() * 0.8,
        brightness: 0.08 + Math.random() * 0.15,
        speed: 0.00003 + Math.random() * 0.00008,
        drift: (Math.random() - 0.5) * 0.00004,
        phase: Math.random() * Math.PI * 2,
        twinkleSpeed: 0.3 + Math.random() * 0.7,
      });
    }

    // --- Interaction state ---

    let mouseX = -1, mouseY = -1;
    let hoveredStar = -1;
    let hoverIntensity = new Float32Array(projects.length);

    canvas.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
    });

    canvas.addEventListener('mouseleave', () => {
      mouseX = -1;
      mouseY = -1;
    });

    canvas.addEventListener('click', () => {
      if (hoveredStar >= 0) {
        window.location.href = projects[hoveredStar].url;
      }
    });

    // --- Draw helpers ---

    function drawGlow(x, y, radius, r, g, b, alpha) {
      if (alpha <= 0) return;
      const grad = ctx.createRadialGradient(x, y, 0, x, y, radius);
      grad.addColorStop(0, `rgba(${r}, ${g}, ${b}, ${alpha})`);
      grad.addColorStop(0.3, `rgba(${r}, ${g}, ${b}, ${alpha * 0.4})`);
      grad.addColorStop(1, `rgba(${r}, ${g}, ${b}, 0)`);
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fill();
    }

    // --- Animation loop ---

    let t = 0;
    let lastTime = performance.now();

    function animate(now) {
      requestAnimationFrame(animate);
      const dt = Math.min((now - lastTime) / 1000, 0.05);
      lastTime = now;
      t += dt;

      ctx.clearRect(0, 0, W, H);

      // -- Dust --
      const dustFade = Math.min(1, t / 1.5);
      for (const d of dust) {
        d.x += d.speed;
        d.y += d.drift;
        if (d.x > 1.05) d.x = -0.05;
        if (d.y > 1.05) d.y = -0.05;
        if (d.y < -0.05) d.y = 1.05;

        const twinkle = 0.5 + 0.5 * Math.sin(t * d.twinkleSpeed + d.phase);
        const alpha = d.brightness * twinkle * dustFade;
        const px = d.x * W;
        const py = d.y * H;

        ctx.fillStyle = `rgba(180, 200, 220, ${alpha})`;
        ctx.fillRect(px, py, d.size, d.size);
      }

      // -- Compute star positions --
      const starCoords = starPositions.map(sp => ({
        x: sp.fx * W,
        y: sp.fy * H,
      }));

      // -- Star arrival alphas --
      const starAlpha = projects.map((_, i) => arrivalAlpha(t, STAR_ARRIVE[i], STAR_FADE_DUR));

      // -- Star arrival chimes --
      if (soundReady && starChimed) {
        for (let i = 0; i < projects.length; i++) {
          if (!starChimed[i] && starAlpha[i] > 0.05) {
            starChimed[i] = true;
            playStarChime(i, 0.06);
          }
        }
      }

      // -- Threads --
      for (const [a, b] of threads) {
        const threadAlpha = Math.min(starAlpha[a], starAlpha[b]);
        if (threadAlpha <= 0) continue;

        const ax = starCoords[a].x, ay = starCoords[a].y;
        const bx = starCoords[b].x, by = starCoords[b].y;

        const isConnected = (hoveredStar === a || hoveredStar === b);
        const threadBright = isConnected ? 0.18 : 0.08;

        ctx.lineWidth = 0.5;
        ctx.strokeStyle = `rgba(60, 80, 110, ${threadBright * threadAlpha})`;
        ctx.beginPath();

        if (threadAlpha < 1) {
          const mx = (ax + bx) / 2, my = (ay + by) / 2;
          const ex = threadAlpha;
          ctx.moveTo(mx + (ax - mx) * ex, my + (ay - my) * ex);
          ctx.lineTo(mx + (bx - mx) * ex, my + (by - my) * ex);
        } else {
          ctx.moveTo(ax, ay);
          ctx.lineTo(bx, by);
        }
        ctx.stroke();
      }

      // -- Hover detection --
      hoveredStar = -1;
      const HOVER_RADIUS = 35;

      for (let i = 0; i < projects.length; i++) {
        if (starAlpha[i] < 0.3) continue;
        const sx = starCoords[i].x;
        const sy = starCoords[i].y;
        const dx = mouseX - sx;
        const dy = mouseY - sy;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < HOVER_RADIUS && hoveredStar < 0) {
          hoveredStar = i;
        }

        const target = (hoveredStar === i) ? 1 : 0;
        hoverIntensity[i] += (target - hoverIntensity[i]) * Math.min(1, dt * 6);
      }

      // Hover sound
      playHoverWhisper(hoveredStar);

      // -- Draw stars --
      for (let i = 0; i < projects.length; i++) {
        const sa = starAlpha[i];
        if (sa <= 0) continue;

        const p = projects[i];
        const sx = starCoords[i].x;
        const sy = starCoords[i].y;
        const hi = hoverIntensity[i];

        const [cr, cg, cb] = p.color;
        const r = Math.floor(cr * 255);
        const g = Math.floor(cg * 255);
        const b = Math.floor(cb * 255);

        const breathe = 0.6 + 0.4 * Math.sin(t * 0.8 + i * 1.7);
        const glowAlpha = ((0.12 + breathe * 0.08) + hi * 0.2) * sa;
        const glowRadius = p.glowSize * (1 + hi * 0.5) * (0.9 + breathe * 0.1);

        const sizeScale = 0.3 + sa * 0.7;

        drawGlow(sx, sy, glowRadius * sizeScale, r, g, b, glowAlpha);
        drawGlow(sx, sy, glowRadius * 0.3 * sizeScale, r, g, b, glowAlpha * 2);

        const coreSize = p.baseSize * (1 + hi * 0.8) * sizeScale;
        const coreAlpha = (0.7 + breathe * 0.3 + hi * 0.3) * sa;
        ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${coreAlpha})`;
        ctx.beginPath();
        ctx.arc(sx, sy, coreSize, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = `rgba(255, 255, 255, ${(0.3 + hi * 0.5) * coreAlpha})`;
        ctx.beginPath();
        ctx.arc(sx, sy, coreSize * 0.4, 0, Math.PI * 2);
        ctx.fill();
      }

      // -- Label --
      if (hoveredStar >= 0) {
        const p = projects[hoveredStar];
        const sc = starCoords[hoveredStar];
        labelName.textContent = p.name;
        labelDesc.textContent = p.desc;
        label.classList.add('visible');
        label.style.left = sc.x + 'px';
        label.style.top = (sc.y - 55) + 'px';
        label.style.transform = 'translateX(-50%)';
        canvas.style.cursor = 'pointer';
      } else {
        label.classList.remove('visible');
        canvas.style.cursor = 'default';
      }

      // -- Title --
      const titleAlpha = arrivalAlpha(t, TITLE_ARRIVE, TITLE_FADE_DUR);
      titleEl.style.opacity = (hoveredStar >= 0)
        ? (titleAlpha * 0.3).toString()
        : titleAlpha.toString();
    }

    requestAnimationFrame(animate);
  </script>
</body>
</html>
