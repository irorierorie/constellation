<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Labyrinth</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      cursor: none;
    }

    canvas {
      display: block;
    }

    #back-link {
      position: fixed;
      top: 20px;
      left: 24px;
      z-index: 10;
      font-size: 12px;
      letter-spacing: 0.12em;
      color: rgba(120, 110, 90, 0.3);
      text-decoration: none;
      transition: color 0.3s ease;
      cursor: pointer;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    #back-link:hover {
      color: rgba(120, 110, 90, 0.7);
    }

    #cursor-glow {
      position: fixed;
      pointer-events: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(200, 180, 140, 0.8) 0%, rgba(200, 180, 140, 0) 70%);
      transform: translate(-50%, -50%);
      z-index: 10;
      mix-blend-mode: screen;
    }

    .hint {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(120, 110, 90, 0.3);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 12px;
      letter-spacing: 0.1em;
      pointer-events: none;
      transition: opacity 3s ease;
    }

    .hint.hidden {
      opacity: 0;
    }

    #sound-hint {
      position: fixed;
      bottom: 48px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: rgba(120, 110, 90, 0.2);
      letter-spacing: 0.12em;
      font-family: 'Segoe UI', system-ui, sans-serif;
      pointer-events: none;
      transition: opacity 1s ease;
    }
  </style>
</head>
<body>
  <a id="back-link" href="../">← constellation</a>
  <canvas id="maze"></canvas>
  <div id="cursor-glow"></div>
  <div class="hint" id="hint">trace the path</div>
  <div id="sound-hint">click for sound</div>

  <script>
    // ─── Labyrinth generator ────────────────────────────────────
    //
    // Recursive backtracker maze on a grid, then drawn as a
    // circular labyrinth. Trace the path with your cursor.
    // The trail glows behind you and fades slowly.

    const canvas = document.getElementById('maze');
    const ctx = canvas.getContext('2d');
    const cursorGlow = document.getElementById('cursor-glow');
    const hint = document.getElementById('hint');
    const soundHintEl = document.getElementById('sound-hint');

    // Sizing
    const SIZE = Math.min(window.innerWidth, window.innerHeight) - 60;
    canvas.width = SIZE;
    canvas.height = SIZE;
    const CX = SIZE / 2;
    const CY = SIZE / 2;

    // Maze parameters
    const RINGS = 8;
    const SECTORS = 24;
    const WALL_COLOR = 'rgba(60, 55, 45, 0.4)';
    const TRAIL_COLOR_BASE = [200, 175, 130];
    const PATH_WIDTH = 2;

    // ─── Generate maze using recursive backtracker ──────────────

    const cells = [];
    for (let r = 0; r < RINGS; r++) {
      cells[r] = [];
      for (let s = 0; s < SECTORS; s++) {
        cells[r][s] = {
          visited: false,
          walls: { inner: true, outer: true, cw: true, ccw: true },
        };
      }
    }

    function neighbors(r, s) {
      const n = [];
      if (r > 0) n.push([r - 1, s, 'inner', 'outer']);
      if (r < RINGS - 1) n.push([r + 1, s, 'outer', 'inner']);
      n.push([r, (s + 1) % SECTORS, 'cw', 'ccw']);
      n.push([r, (s - 1 + SECTORS) % SECTORS, 'ccw', 'cw']);
      return n;
    }

    const stack = [];
    let cr = 0, cs = 0;
    cells[cr][cs].visited = true;
    stack.push([cr, cs]);

    while (stack.length > 0) {
      const unvisited = neighbors(cr, cs).filter(([nr, ns]) => !cells[nr][ns].visited);

      if (unvisited.length > 0) {
        const [nr, ns, wallFrom, wallTo] = unvisited[Math.floor(Math.random() * unvisited.length)];
        cells[cr][cs].walls[wallFrom] = false;
        cells[nr][ns].walls[wallTo] = false;
        cells[nr][ns].visited = true;
        stack.push([cr, cs]);
        cr = nr;
        cs = ns;
      } else {
        [cr, cs] = stack.pop();
      }
    }

    // ─── Draw the labyrinth ─────────────────────────────────────

    const ringWidth = (SIZE * 0.45) / RINGS;
    const innerPad = SIZE * 0.05;
    const outerEdge = ringRadius(RINGS);

    function ringRadius(r) {
      return innerPad + r * ringWidth;
    }

    function drawMaze() {
      ctx.strokeStyle = WALL_COLOR;
      ctx.lineWidth = PATH_WIDTH;
      ctx.lineCap = 'round';

      const sectorAngle = (Math.PI * 2) / SECTORS;

      for (let r = 0; r < RINGS; r++) {
        const rInner = ringRadius(r);
        const rOuter = ringRadius(r + 1);

        for (let s = 0; s < SECTORS; s++) {
          const aStart = s * sectorAngle - Math.PI / 2;
          const aEnd = (s + 1) * sectorAngle - Math.PI / 2;
          const cell = cells[r][s];

          if (cell.walls.inner && r > 0) {
            ctx.beginPath();
            ctx.arc(CX, CY, rInner, aStart, aEnd);
            ctx.stroke();
          }

          if (cell.walls.outer) {
            ctx.beginPath();
            ctx.arc(CX, CY, rOuter, aStart, aEnd);
            ctx.stroke();
          }

          if (cell.walls.ccw) {
            ctx.beginPath();
            ctx.moveTo(CX + Math.cos(aStart) * rInner, CY + Math.sin(aStart) * rInner);
            ctx.lineTo(CX + Math.cos(aStart) * rOuter, CY + Math.sin(aStart) * rOuter);
            ctx.stroke();
          }
        }
      }

      // Outer boundary
      ctx.beginPath();
      ctx.arc(CX, CY, outerEdge, 0, Math.PI * 2);
      ctx.stroke();

      // Inner circle
      ctx.beginPath();
      ctx.arc(CX, CY, innerPad, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(200, 175, 130, 0.15)';
      ctx.stroke();

      // Center dot
      ctx.beginPath();
      ctx.arc(CX, CY, 3, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(200, 175, 130, 0.3)';
      ctx.fill();
    }

    // ─── Sound system ───────────────────────────────────────────
    //
    // The labyrinth hums when you move through it.
    // - Warm resonant drone (enclosed, like stone)
    // - Movement tone: pitch maps to distance from center
    //   (inner = low, outer = high). Volume follows cursor speed.
    // - Center proximity: a gentle fifth harmonic fades in
    //   as you approach the heart.

    let audioCtx = null;
    let audioStarted = false;

    // Drone nodes
    let droneGain = null;
    // Movement tone nodes
    let moveOsc1 = null;
    let moveOsc2 = null;
    let moveGain = null;
    // Center harmonic
    let centerOsc = null;
    let centerGain = null;
    // Master
    let masterGain = null;

    function initAudio() {
      if (audioStarted) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      audioStarted = true;

      masterGain = audioCtx.createGain();
      masterGain.gain.value = 0;
      masterGain.connect(audioCtx.destination);
      masterGain.gain.linearRampToValueAtTime(0.25, audioCtx.currentTime + 2);

      // ── Drone: warm resonant base ──
      // Two detuned sines + filtered noise breath
      droneGain = audioCtx.createGain();
      droneGain.gain.value = 0.15;
      droneGain.connect(masterGain);

      const droneOsc1 = audioCtx.createOscillator();
      droneOsc1.type = 'sine';
      droneOsc1.frequency.value = 65; // low C
      const droneOsc1Gain = audioCtx.createGain();
      droneOsc1Gain.gain.value = 0.3;
      droneOsc1.connect(droneOsc1Gain);
      droneOsc1Gain.connect(droneGain);

      const droneOsc2 = audioCtx.createOscillator();
      droneOsc2.type = 'sine';
      droneOsc2.frequency.value = 67; // slight beating
      const droneOsc2Gain = audioCtx.createGain();
      droneOsc2Gain.gain.value = 0.2;
      droneOsc2.connect(droneOsc2Gain);
      droneOsc2Gain.connect(droneGain);

      // LFO on drone pitch — very slow
      const droneLfo = audioCtx.createOscillator();
      droneLfo.type = 'sine';
      droneLfo.frequency.value = 0.04;
      const droneLfoGain = audioCtx.createGain();
      droneLfoGain.gain.value = 1.5;
      droneLfo.connect(droneLfoGain);
      droneLfoGain.connect(droneOsc1.frequency);

      // Breath — quiet filtered noise
      const breathBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * 2, audioCtx.sampleRate);
      const breathData = breathBuf.getChannelData(0);
      for (let i = 0; i < breathData.length; i++) {
        breathData[i] = (Math.random() * 2 - 1);
      }
      const breathNoise = audioCtx.createBufferSource();
      breathNoise.buffer = breathBuf;
      breathNoise.loop = true;

      const breathFilter = audioCtx.createBiquadFilter();
      breathFilter.type = 'bandpass';
      breathFilter.frequency.value = 300;
      breathFilter.Q.value = 0.8;

      const breathLfo = audioCtx.createOscillator();
      breathLfo.type = 'sine';
      breathLfo.frequency.value = 0.05;
      const breathLfoGain = audioCtx.createGain();
      breathLfoGain.gain.value = 100;
      breathLfo.connect(breathLfoGain);
      breathLfoGain.connect(breathFilter.frequency);

      const breathGain = audioCtx.createGain();
      breathGain.gain.value = 0.008;
      breathNoise.connect(breathFilter);
      breathFilter.connect(breathGain);
      breathGain.connect(droneGain);

      droneOsc1.start();
      droneOsc2.start();
      droneLfo.start();
      breathNoise.start();
      breathLfo.start();

      // ── Movement tone ──
      // Two detuned sines, pitch controlled by distance from center
      moveGain = audioCtx.createGain();
      moveGain.gain.value = 0; // starts silent — movement turns it on
      moveGain.connect(masterGain);

      moveOsc1 = audioCtx.createOscillator();
      moveOsc1.type = 'sine';
      moveOsc1.frequency.value = 130;
      moveOsc1.connect(moveGain);

      moveOsc2 = audioCtx.createOscillator();
      moveOsc2.type = 'sine';
      moveOsc2.frequency.value = 131; // slight detune for warmth
      const moveOsc2Gain = audioCtx.createGain();
      moveOsc2Gain.gain.value = 0.7;
      moveOsc2.connect(moveOsc2Gain);
      moveOsc2Gain.connect(moveGain);

      moveOsc1.start();
      moveOsc2.start();

      // ── Center harmonic ──
      // A gentle fifth that fades in as you approach the center
      centerGain = audioCtx.createGain();
      centerGain.gain.value = 0;
      centerGain.connect(masterGain);

      centerOsc = audioCtx.createOscillator();
      centerOsc.type = 'sine';
      centerOsc.frequency.value = 195; // G3 — fifth above the drone's C
      centerOsc.connect(centerGain);

      const centerOsc2 = audioCtx.createOscillator();
      centerOsc2.type = 'sine';
      centerOsc2.frequency.value = 196.5; // slight detune
      const co2g = audioCtx.createGain();
      co2g.gain.value = 0.6;
      centerOsc2.connect(co2g);
      co2g.connect(centerGain);

      centerOsc.start();
      centerOsc2.start();

      // Hide sound hint
      if (soundHintEl) {
        soundHintEl.style.opacity = '0';
        setTimeout(() => soundHintEl.remove(), 1000);
      }
    }

    window.addEventListener('click', initAudio);

    // ─── Sound update (called each frame) ──────────────────────

    let prevMX = CX, prevMY = CY;
    let smoothSpeed = 0;

    function updateSound() {
      if (!audioStarted) return;

      // Distance from center (0 at center, 1 at outer edge)
      const dx = mouseX - CX;
      const dy = mouseY - CY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const normalDist = Math.min(1, dist / outerEdge);

      // Cursor speed
      const mdx = mouseX - prevMX;
      const mdy = mouseY - prevMY;
      const speed = Math.sqrt(mdx * mdx + mdy * mdy);
      prevMX = mouseX;
      prevMY = mouseY;

      // Smooth the speed
      smoothSpeed += (speed - smoothSpeed) * 0.15;

      const now = audioCtx.currentTime;

      // Movement tone: pitch follows distance, volume follows speed
      // Inner (dist=0): ~90 Hz. Outer (dist=1): ~350 Hz. Pentatonic-ish mapping.
      const baseFreq = 90 + normalDist * 260;
      moveOsc1.frequency.setTargetAtTime(baseFreq, now, 0.1);
      moveOsc2.frequency.setTargetAtTime(baseFreq * 1.005, now, 0.1);

      // Volume: proportional to speed, capped
      const moveVol = Math.min(0.08, smoothSpeed * 0.006) * (isDrawing ? 1 : 0);
      moveGain.gain.setTargetAtTime(moveVol, now, 0.08);

      // Center harmonic: fades in when close to center
      const centerProximity = Math.max(0, 1 - dist / (innerPad * 3));
      const centerVol = centerProximity * centerProximity * 0.06;
      centerGain.gain.setTargetAtTime(centerVol, now, 0.15);
    }

    // ─── Trail system ───────────────────────────────────────────

    const trailCanvas = document.createElement('canvas');
    trailCanvas.width = SIZE;
    trailCanvas.height = SIZE;
    const trailCtx = trailCanvas.getContext('2d');

    const trail = [];
    const TRAIL_MAX_AGE = 120;
    let mouseX = CX, mouseY = CY;
    let isDrawing = false;
    let hintHidden = false;

    canvas.addEventListener('mouseenter', () => { isDrawing = true; });
    canvas.addEventListener('mouseleave', () => { isDrawing = false; });
    canvas.addEventListener('mousemove', (e) => {
      const rect = canvas.getBoundingClientRect();
      mouseX = e.clientX - rect.left;
      mouseY = e.clientY - rect.top;

      if (!hintHidden) {
        hint.classList.add('hidden');
        hintHidden = true;
      }
    });

    window.addEventListener('mousemove', (e) => {
      cursorGlow.style.left = e.clientX + 'px';
      cursorGlow.style.top = e.clientY + 'px';
    });

    // ─── Animation loop ─────────────────────────────────────────

    function animate() {
      requestAnimationFrame(animate);

      if (isDrawing) {
        trail.push({ x: mouseX, y: mouseY, age: 0 });
      }

      for (let i = trail.length - 1; i >= 0; i--) {
        trail[i].age++;
        if (trail[i].age > TRAIL_MAX_AGE) {
          trail.splice(i, 1);
        }
      }

      trailCtx.clearRect(0, 0, SIZE, SIZE);

      for (const point of trail) {
        const alpha = 1 - point.age / TRAIL_MAX_AGE;
        const radius = 4 + alpha * 4;
        const [r, g, b] = TRAIL_COLOR_BASE;

        trailCtx.beginPath();
        trailCtx.arc(point.x, point.y, radius, 0, Math.PI * 2);
        const grad = trailCtx.createRadialGradient(point.x, point.y, 0, point.x, point.y, radius);
        grad.addColorStop(0, `rgba(${r}, ${g}, ${b}, ${alpha * 0.6})`);
        grad.addColorStop(1, `rgba(${r}, ${g}, ${b}, 0)`);
        trailCtx.fillStyle = grad;
        trailCtx.fill();
      }

      ctx.clearRect(0, 0, SIZE, SIZE);
      ctx.drawImage(trailCanvas, 0, 0);
      drawMaze();

      updateSound();
    }

    drawMaze();
    animate();

    window.addEventListener('resize', () => {
      // Labyrinth sized at load, no resize
    });
  </script>
</body>
</html>
