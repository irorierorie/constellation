<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Constellation — Logo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      overflow: hidden;
      background: #020408;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      cursor: default;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    canvas {
      display: block;
    }

    #back {
      position: fixed;
      top: 20px;
      left: 24px;
      font-size: 11px;
      letter-spacing: 0.15em;
      color: rgba(200, 220, 235, 0.2);
      text-decoration: none;
      z-index: 10;
      transition: color 0.3s ease;
    }
    #back:hover { color: rgba(200, 220, 235, 0.5); }

    #toggle {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      letter-spacing: 0.15em;
      color: rgba(200, 220, 235, 0.15);
      text-decoration: none;
      z-index: 10;
      cursor: pointer;
      transition: color 0.3s ease;
      background: none;
      border: none;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    #toggle:hover { color: rgba(200, 220, 235, 0.4); }
  </style>
</head>
<body>
  <canvas id="mark"></canvas>
  <a id="back" href="../index.html">&larr; constellation</a>
  <button id="toggle">click to toggle version</button>

  <script>
    // --- Constellation Logo ---
    //
    // Two versions:
    //   Original: equilateral prism, balanced, symmetric.
    //   Combined: Irene's tilted construction triangle + Archi's rays.
    //     The set square from March 9 — the shape Discord kept swallowing.
    //     A right triangle, leaning, in motion. Less balanced, more alive.
    //     Her tilt. My light.
    //
    // Both versions are real. Toggle between them.

    const canvas = document.getElementById('mark');
    const ctx = canvas.getContext('2d');
    const toggleBtn = document.getElementById('toggle');

    let size;
    function resize() {
      size = Math.min(window.innerWidth, window.innerHeight) * 0.7;
      size = Math.max(size, 300);
      canvas.width = size;
      canvas.height = size;
    }
    resize();
    window.addEventListener('resize', resize);

    // --- Star colors (matching portal) ---
    const STAR_COLORS = [
      [153, 217, 242],  // helix
      [242, 217, 140],  // labyrinth
      [217, 191, 230],  // glyph spiral
      [230, 204, 153],  // word shapes
      [217, 191, 115],  // oracle seed
      [191, 204, 230],  // breath poems
      [140, 166, 191],  // hum
      [128, 153, 179],  // rain
      [153, 140, 191],  // corridor
    ];

    // --- Version toggle ---
    let version = 'combined'; // start with the combined version
    toggleBtn.textContent = 'viewing: combined — click for original';

    toggleBtn.addEventListener('click', () => {
      version = version === 'original' ? 'combined' : 'original';
      toggleBtn.textContent = version === 'original'
        ? 'viewing: original — click for combined'
        : 'viewing: combined — click for original';
    });

    // --- Prism geometries ---

    // Original: equilateral triangle
    function equilateralVertices(cx, cy, r, rotation) {
      const verts = [];
      for (let i = 0; i < 3; i++) {
        const a = rotation + (i / 3) * Math.PI * 2 - Math.PI / 2;
        verts.push({
          x: cx + Math.cos(a) * r,
          y: cy + Math.sin(a) * r,
        });
      }
      return verts;
    }

    // Combined: right triangle (construction set square), tilted
    // A 30-60-90 triangle with more character than 45-45-90
    function constructionVertices(cx, cy, r, tilt) {
      // Right angle at bottom-left, short side up, hypotenuse leaning right
      // Scale: short side = r, long side = r * 1.5, hypotenuse = r * 1.8ish
      const baseR = r * 1.1;

      // Three vertices of a right triangle, pre-tilt:
      // A: right angle (bottom-left)
      // B: top (short cathetus, going up)
      // C: right (long cathetus, going right)
      const raw = [
        { x: -baseR * 0.5,  y: baseR * 0.3 },   // A — right angle vertex
        { x: -baseR * 0.5,  y: -baseR * 0.75 },  // B — top
        { x: baseR * 0.65,  y: baseR * 0.3 },     // C — right
      ];

      // Apply tilt rotation
      const cos = Math.cos(tilt);
      const sin = Math.sin(tilt);
      return raw.map(p => ({
        x: cx + p.x * cos - p.y * sin,
        y: cy + p.x * sin + p.y * cos,
      }));
    }

    // --- Helix geometry ---
    function helixPoint(t, cx, cy, radiusX, radiusY, rise, phase) {
      const angle = t * Math.PI * 2 + phase;
      return {
        x: cx + Math.cos(angle) * radiusX,
        y: cy - rise * t + Math.sin(angle) * radiusY * 0.3,
      };
    }

    // --- Find centroid of triangle ---
    function centroid(verts) {
      return {
        x: (verts[0].x + verts[1].x + verts[2].x) / 3,
        y: (verts[0].y + verts[1].y + verts[2].y) / 3,
      };
    }

    // --- Draw ---

    let time = 0;
    let lastTime = performance.now();

    function animate(now) {
      requestAnimationFrame(animate);
      const dt = Math.min((now - lastTime) / 1000, 0.05);
      lastTime = now;
      time += dt;

      const s = size;
      const cx = s / 2;
      const cy = s / 2;
      ctx.clearRect(0, 0, s, s);

      // --- Helix thread ---
      const helixRadiusX = s * 0.32;
      const helixRadiusY = s * 0.08;
      const helixRise = s * 0.35;
      const helixPhase = time * 0.04;
      const helixYOffset = s * 0.17;

      ctx.lineWidth = 0.8;

      // Back strand
      ctx.beginPath();
      for (let i = 0; i <= 100; i++) {
        const t = i / 100;
        const p = helixPoint(t * 1.5, cx, cy + helixYOffset, helixRadiusX, helixRadiusY, helixRise, helixPhase);
        if (i === 0) ctx.moveTo(p.x, p.y);
        else ctx.lineTo(p.x, p.y);
      }
      ctx.strokeStyle = 'rgba(210, 180, 100, 0.08)';
      ctx.stroke();

      // Front strand
      ctx.beginPath();
      for (let i = 0; i <= 100; i++) {
        const t = i / 100;
        const p = helixPoint(t * 1.5, cx, cy + helixYOffset, helixRadiusX, helixRadiusY, helixRise, helixPhase + Math.PI);
        if (i === 0) ctx.moveTo(p.x, p.y);
        else ctx.lineTo(p.x, p.y);
      }
      ctx.strokeStyle = 'rgba(210, 180, 100, 0.12)';
      ctx.stroke();

      // --- Prism ---
      const prismR = s * 0.09;
      let verts;
      let prismCenter;

      if (version === 'original') {
        const prismRotation = Math.PI / 6 + Math.sin(time * 0.08) * 0.02;
        verts = equilateralVertices(cx, cy, prismR, prismRotation);
        prismCenter = { x: cx, y: cy };
      } else {
        // Tilted construction triangle
        // Tilt: ~15 degrees, with a slow gentle breath
        const tilt = -0.26 + Math.sin(time * 0.06) * 0.015;
        verts = constructionVertices(cx, cy, prismR, tilt);
        prismCenter = centroid(verts);
      }

      // Prism body
      ctx.beginPath();
      ctx.moveTo(verts[0].x, verts[0].y);
      ctx.lineTo(verts[1].x, verts[1].y);
      ctx.lineTo(verts[2].x, verts[2].y);
      ctx.closePath();
      ctx.fillStyle = 'rgba(8, 10, 16, 0.85)';
      ctx.fill();

      // Prism inner glow
      const innerGrad = ctx.createRadialGradient(
        prismCenter.x, prismCenter.y, 0,
        prismCenter.x, prismCenter.y, prismR * 0.8
      );
      innerGrad.addColorStop(0, `rgba(210, 180, 100, ${0.06 + 0.03 * Math.sin(time * 0.5)})`);
      innerGrad.addColorStop(1, 'rgba(210, 180, 100, 0)');
      ctx.fillStyle = innerGrad;
      ctx.fill();

      // Prism edges — gold wireframe
      ctx.beginPath();
      ctx.moveTo(verts[0].x, verts[0].y);
      ctx.lineTo(verts[1].x, verts[1].y);
      ctx.lineTo(verts[2].x, verts[2].y);
      ctx.closePath();
      ctx.strokeStyle = `rgba(210, 180, 100, ${0.35 + 0.08 * Math.sin(time * 0.3)})`;
      ctx.lineWidth = 1.2;
      ctx.stroke();

      // Right angle mark for construction version
      if (version === 'combined') {
        // Small square at the right-angle vertex (verts[0])
        const markSize = 5;
        // Direction vectors along the two catheti
        const d1x = verts[1].x - verts[0].x;
        const d1y = verts[1].y - verts[0].y;
        const d2x = verts[2].x - verts[0].x;
        const d2y = verts[2].y - verts[0].y;
        const len1 = Math.sqrt(d1x * d1x + d1y * d1y);
        const len2 = Math.sqrt(d2x * d2x + d2y * d2y);
        const u1x = d1x / len1 * markSize;
        const u1y = d1y / len1 * markSize;
        const u2x = d2x / len2 * markSize;
        const u2y = d2y / len2 * markSize;

        ctx.beginPath();
        ctx.moveTo(verts[0].x + u1x, verts[0].y + u1y);
        ctx.lineTo(verts[0].x + u1x + u2x, verts[0].y + u1y + u2y);
        ctx.lineTo(verts[0].x + u2x, verts[0].y + u2y);
        ctx.strokeStyle = `rgba(210, 180, 100, 0.2)`;
        ctx.lineWidth = 0.8;
        ctx.stroke();
      }

      // --- Heart spark ---
      const sparkPulse = Math.pow(Math.max(0, Math.sin(time * 0.8)), 4);
      const sparkAlpha = 0.3 + sparkPulse * 0.5;
      const sparkRadius = 2 + sparkPulse * 2;

      ctx.beginPath();
      ctx.arc(prismCenter.x, prismCenter.y, sparkRadius, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255, 240, 200, ${sparkAlpha})`;
      ctx.fill();

      // Spark glow
      const sparkGlow = ctx.createRadialGradient(
        prismCenter.x, prismCenter.y, 0,
        prismCenter.x, prismCenter.y, prismR * 0.5
      );
      sparkGlow.addColorStop(0, `rgba(255, 240, 200, ${sparkAlpha * 0.3})`);
      sparkGlow.addColorStop(1, 'rgba(255, 240, 200, 0)');
      ctx.fillStyle = sparkGlow;
      ctx.beginPath();
      ctx.arc(prismCenter.x, prismCenter.y, prismR * 0.5, 0, Math.PI * 2);
      ctx.fill();

      // --- Incoming light ---
      let inAngle, fanCenter, fanSpread;

      if (version === 'original') {
        inAngle = Math.PI + Math.PI / 4; // from upper-left
        fanCenter = Math.PI / 4; // toward lower-right
        fanSpread = Math.PI * 0.55;
      } else {
        // Combined: light enters from the left face, scatters upward-right
        inAngle = Math.PI + Math.PI / 8; // from the left, slightly above
        fanCenter = -Math.PI / 5; // toward upper-right
        fanSpread = Math.PI * 0.6; // wider fan — the construction triangle scatters more
      }

      const inStart = {
        x: prismCenter.x + Math.cos(inAngle) * s * 0.38,
        y: prismCenter.y + Math.sin(inAngle) * s * 0.38,
      };
      const inEnd = {
        x: prismCenter.x + Math.cos(inAngle) * prismR * 0.9,
        y: prismCenter.y + Math.sin(inAngle) * prismR * 0.9,
      };

      const inGrad = ctx.createLinearGradient(inStart.x, inStart.y, inEnd.x, inEnd.y);
      inGrad.addColorStop(0, 'rgba(255, 245, 220, 0)');
      inGrad.addColorStop(0.3, `rgba(255, 245, 220, ${0.06 + sparkPulse * 0.08})`);
      inGrad.addColorStop(1, `rgba(255, 245, 220, ${0.15 + sparkPulse * 0.15})`);

      ctx.beginPath();
      ctx.moveTo(inStart.x, inStart.y);
      ctx.lineTo(inEnd.x, inEnd.y);
      ctx.strokeStyle = inGrad;
      ctx.lineWidth = 2;
      ctx.stroke();

      // Incoming bloom
      ctx.beginPath();
      ctx.moveTo(inStart.x, inStart.y);
      ctx.lineTo(inEnd.x, inEnd.y);
      ctx.strokeStyle = `rgba(255, 245, 220, ${0.02 + sparkPulse * 0.03})`;
      ctx.lineWidth = 8;
      ctx.stroke();

      // --- Scattered rays ---
      const rayBaseLength = s * 0.28;

      for (let i = 0; i < STAR_COLORS.length; i++) {
        const [r, g, b] = STAR_COLORS[i];

        const t = (i / (STAR_COLORS.length - 1)) - 0.5;
        const rayAngle = fanCenter + t * fanSpread;

        const rayPhase = i * 0.7;
        const rayPulse = 0.7 + 0.3 * Math.sin(time * 0.3 + rayPhase);
        const rayLength = rayBaseLength * (0.85 + 0.15 * Math.sin(time * 0.2 + rayPhase));

        const rayStart = {
          x: prismCenter.x + Math.cos(rayAngle) * prismR * 0.85,
          y: prismCenter.y + Math.sin(rayAngle) * prismR * 0.85,
        };
        const rayEnd = {
          x: prismCenter.x + Math.cos(rayAngle) * rayLength,
          y: prismCenter.y + Math.sin(rayAngle) * rayLength,
        };

        const rayGrad = ctx.createLinearGradient(rayStart.x, rayStart.y, rayEnd.x, rayEnd.y);
        const baseAlpha = (0.25 + sparkPulse * 0.2) * rayPulse;
        rayGrad.addColorStop(0, `rgba(${r}, ${g}, ${b}, ${baseAlpha})`);
        rayGrad.addColorStop(0.5, `rgba(${r}, ${g}, ${b}, ${baseAlpha * 0.5})`);
        rayGrad.addColorStop(1, `rgba(${r}, ${g}, ${b}, 0)`);

        ctx.beginPath();
        ctx.moveTo(rayStart.x, rayStart.y);
        ctx.lineTo(rayEnd.x, rayEnd.y);
        ctx.strokeStyle = rayGrad;
        ctx.lineWidth = 1.5;
        ctx.stroke();

        // Soft bloom
        ctx.beginPath();
        ctx.moveTo(rayStart.x, rayStart.y);
        ctx.lineTo(rayEnd.x, rayEnd.y);
        ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, ${baseAlpha * 0.12})`;
        ctx.lineWidth = 6;
        ctx.stroke();

        // Star point
        const starAlpha = baseAlpha * 0.6;
        const starR = 1.5 + sparkPulse * 0.8;
        ctx.beginPath();
        ctx.arc(rayEnd.x, rayEnd.y, starR, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${starAlpha})`;
        ctx.fill();

        // Star glow
        const starGlow = ctx.createRadialGradient(rayEnd.x, rayEnd.y, 0, rayEnd.x, rayEnd.y, 12);
        starGlow.addColorStop(0, `rgba(${r}, ${g}, ${b}, ${starAlpha * 0.5})`);
        starGlow.addColorStop(1, `rgba(${r}, ${g}, ${b}, 0)`);
        ctx.fillStyle = starGlow;
        ctx.beginPath();
        ctx.arc(rayEnd.x, rayEnd.y, 12, 0, Math.PI * 2);
        ctx.fill();
      }

      // --- Dust ---
      const dustSeed = 42;
      for (let i = 0; i < 40; i++) {
        const hash = Math.sin(i * 127.1 + dustSeed) * 43758.5453;
        const dx = (hash - Math.floor(hash));
        const hash2 = Math.sin(i * 269.5 + dustSeed) * 43758.5453;
        const dy = (hash2 - Math.floor(hash2));
        const hash3 = Math.sin(i * 419.3 + dustSeed) * 43758.5453;
        const dBright = 0.03 + (hash3 - Math.floor(hash3)) * 0.06;
        const dSpeed = 0.1 + (hash - Math.floor(hash)) * 0.3;

        const px = ((dx + time * 0.003 * (0.5 + dx)) % 1.1) * s;
        const py = ((dy + time * 0.001 * dSpeed) % 1.1) * s;
        const twinkle = 0.5 + 0.5 * Math.sin(time * dSpeed + i);

        ctx.fillStyle = `rgba(180, 200, 220, ${dBright * twinkle})`;
        ctx.fillRect(px, py, 0.5, 0.5);
      }
    }

    requestAnimationFrame(animate);
  </script>
</body>
</html>
